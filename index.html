<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body id="varta-bg">
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4 m-2 login-card" style="width: 550px; max-width: 90%;">
            <h4 class="text-center fw-bold mb-4">Library Management System</h4>

            <form id="loginForm">
                
                <div id="errorAlert" class="alert alert-danger d-none mb-3 p-2 small text-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid email format or empty password!
                </div>

                <div class="row align-items-center">
                    <div class="col-md-5 border-end text-center pb-3 pb-md-0">
                        <i class="bi bi-book text-primary" style="font-size: 5rem;"></i>
                        <p class="text-muted small mt-2 mb-0">Faculty of Information Science</p>
                    </div>

                    <div class="col-md-7">
                        <label class="form-label small fw-semibold">Email</label>
                        <input name="Email" type="email" id="emailInput" placeholder="email" class="form-control mb-2" required>
                        
                        <label class="form-label small fw-semibold">Password</label>
                        <input name="Password" type="password" id="passwordInput" placeholder="••••••••" class="form-control mb-3" required>

                        <div class="text-end">
                            <button type="submit" class="btn btn-primary btn-sm px-4">Login</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
    VANTA.NET({
      el: "#varta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x3f51b5,         
      backgroundColor: 0x1a1a2e 
    })
    </script>

   <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); 

        // Mengubah input menjadi huruf kecil penuh semasa semakan (lebih selamat)
        const email = document.getElementById('emailInput').value.toLowerCase().trim();
        const password = document.getElementById('passwordInput').value;
        const errorAlert = document.getElementById('errorAlert');

        // AKAUN TETAP
        const correctEmail = "nurul@student.edu.my";
        const correctPassword = "password123";

        if (email === correctEmail && password === correctPassword) {
            sessionStorage.setItem("loggedInUser", "Nurul");
            errorAlert.classList.add('d-none');
            window.location.href = "dashboard.html"; 
        } else {
            errorAlert.textContent = "Wrong email or password! Please try again.";
            errorAlert.classList.remove('d-none');
        }
    });
    </script>
</body>
</html>
